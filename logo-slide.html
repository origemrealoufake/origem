<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Origem | Logo Slide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg1: #e7fbff;
        --bg2: #d5f2ff;
        --bg3: #f7fffb;
        --ink: #12384e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: "Nunito", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 20% 22%, rgba(255, 255, 255, 0.96), transparent 22%),
          radial-gradient(circle at 80% 18%, rgba(113, 219, 255, 0.28), transparent 24%),
          radial-gradient(circle at 70% 76%, rgba(123, 237, 191, 0.22), transparent 28%),
          linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 48%, var(--bg3) 100%);
      }

      .logo-stage {
        position: relative;
        width: min(86vw, 920px);
        min-height: min(60vw, 460px);
        display: grid;
        place-items: center;
        overflow: hidden;
        border-radius: 44px;
        border: 1px solid rgba(255, 255, 255, 0.82);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.76), rgba(232, 247, 255, 0.54) 58%, rgba(243, 255, 248, 0.7)),
          rgba(255, 255, 255, 0.42);
        box-shadow:
          inset 0 1px 18px rgba(255, 255, 255, 0.92),
          0 30px 80px rgba(20, 91, 131, 0.14);
        backdrop-filter: blur(20px);
      }

      .logo-stage::before,
      .logo-stage::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(2px);
      }

      .logo-stage::before {
        width: 300px;
        height: 300px;
        top: -80px;
        left: -60px;
        background: radial-gradient(circle, rgba(124, 226, 255, 0.4), transparent 68%);
        animation: glowDrift 14s ease-in-out infinite;
      }

      .logo-stage::after {
        width: 260px;
        height: 260px;
        bottom: -70px;
        right: -30px;
        background: radial-gradient(circle, rgba(117, 236, 184, 0.3), transparent 70%);
        animation: glowDrift 16s ease-in-out infinite reverse;
      }

      .ring,
      .ring-two,
      .ring-three {
        position: absolute;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.72);
        background: radial-gradient(circle, rgba(255, 255, 255, 0.14), transparent 70%);
        animation: orbitPulse 10s ease-in-out infinite;
      }

      .ring {
        width: 420px;
        height: 420px;
      }

      .ring-two {
        width: 540px;
        height: 540px;
        animation-delay: -2.8s;
      }

      .ring-three {
        width: 660px;
        height: 660px;
        animation-delay: -5.6s;
      }

      .logo-wrap {
        position: relative;
        z-index: 2;
        display: grid;
        justify-items: center;
        gap: 22px;
        animation: logoEnter 1s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .logo-core {
        position: relative;
        display: grid;
        place-items: center;
        width: 190px;
        height: 190px;
        border-radius: 42px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(154, 233, 255, 0.44) 56%, rgba(107, 230, 171, 0.3)),
          linear-gradient(135deg, #d2f8ff, #89d8ff);
        box-shadow:
          inset 0 2px 18px rgba(255, 255, 255, 0.92),
          0 28px 50px rgba(18, 96, 149, 0.16);
        animation: coreFloat 6s ease-in-out infinite;
      }

      .logo-core::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 34px;
        border: 1px solid rgba(255, 255, 255, 0.86);
      }

      .logo-letter {
        font-family: "Exo 2", sans-serif;
        font-size: 5.4rem;
        font-weight: 800;
        line-height: 1;
        color: #0f628d;
        text-shadow: 0 8px 20px rgba(16, 98, 141, 0.16);
      }

      .logo-title {
        display: grid;
        justify-items: center;
        gap: 6px;
      }

      .logo-title strong {
        font-family: "Exo 2", sans-serif;
        font-size: clamp(2.4rem, 5vw, 4.2rem);
        letter-spacing: -0.05em;
      }

      .logo-title span {
        color: rgba(18, 56, 78, 0.74);
        font-size: clamp(1rem, 1.8vw, 1.2rem);
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .shine {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0) 18%, rgba(255, 255, 255, 0.58) 42%, rgba(255, 255, 255, 0) 66%);
        transform: translateX(-120%);
        animation: shineSweep 7s ease-in-out infinite;
      }

      @keyframes logoEnter {
        from {
          opacity: 0;
          transform: translate3d(0, 36px, 0) scale(0.92);
        }

        to {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1);
        }
      }

      @keyframes coreFloat {
        0%,
        100% {
          transform: translate3d(0, 0, 0) scale(1);
        }

        50% {
          transform: translate3d(0, -10px, 0) scale(1.03);
        }
      }

      @keyframes orbitPulse {
        0%,
        100% {
          opacity: 0.44;
          transform: scale(1);
        }

        50% {
          opacity: 0.82;
          transform: scale(1.04);
        }
      }

      @keyframes glowDrift {
        0%,
        100% {
          transform: translate3d(0, 0, 0);
        }

        50% {
          transform: translate3d(26px, 18px, 0);
        }
      }

      @keyframes shineSweep {
        0%,
        100% {
          transform: translateX(-120%);
        }

        48%,
        56% {
          transform: translateX(120%);
        }
      }

      @media (max-width: 720px) {
        .logo-stage {
          width: min(92vw, 920px);
          min-height: 72vw;
          border-radius: 30px;
        }

        .ring {
          width: 260px;
          height: 260px;
        }

        .ring-two {
          width: 340px;
          height: 340px;
        }

        .ring-three {
          width: 420px;
          height: 420px;
        }

        .logo-core {
          width: 130px;
          height: 130px;
          border-radius: 30px;
        }

        .logo-core::before {
          inset: 8px;
          border-radius: 24px;
        }

        .logo-letter {
          font-size: 3.9rem;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation: none !important;
        }
      }
    </style>
  </head>
  <body>
    <section class="logo-stage" aria-label="Animação da logo Origem">
      <div class="ring"></div>
      <div class="ring-two"></div>
      <div class="ring-three"></div>

      <div class="logo-wrap">
        <div class="logo-core">
          <div class="shine"></div>
          <span class="logo-letter">O</span>
        </div>

        <div class="logo-title">
          <strong>Origem</strong>
          <span>cheque antes</span>
        </div>
      </div>
    </section>
  </body>
</html>
